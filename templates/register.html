{% extends 'base.html' %}
{% block title %}Register - Bunk Manager Pro{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12 bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-gray-100 dark:border-gray-700">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white">Create an Account</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-2">Start managing your attendance effortlessly</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}" class="space-y-5">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Full Name</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fa-solid fa-user text-gray-400"></i>
                </div>
                <input type="text" id="name" name="name" required 
                    class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-primary focus:border-primary dark:bg-gray-700 dark:text-white transition-colors"
                    placeholder="John Doe">
            </div>
        </div>
        
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email Address</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fa-solid fa-envelope text-gray-400"></i>
                </div>
                <input type="email" id="email" name="email" required 
                    class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-primary focus:border-primary dark:bg-gray-700 dark:text-white transition-colors"
                    placeholder="you@example.com">
            </div>
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fa-solid fa-lock text-gray-400"></i>
                </div>
                <input type="password" id="password" name="password" required minlength="6"
                    class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 rounded-xl focus:ring-primary focus:border-primary dark:bg-gray-700 dark:text-white transition-colors"
                    placeholder="••••••••">
            </div>
            <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">Must be at least 6 characters.</p>
        </div>

        <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-base font-bold text-white bg-gradient-to-r from-primary to-indigo-600 hover:from-indigo-600 hover:to-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-300 transform hover:-translate-y-0.5">
            Register Account <i class="fa-solid fa-user-plus ml-2 mt-1"></i>
        </button>
    </form>
    
    <div class="mt-8 text-center text-sm text-gray-600 dark:text-gray-400">
        Already have an account? <a href="{{ url_for('login') }}" class="font-bold text-primary hover:text-indigo-500 transition-colors">Sign in</a>
    </div>
</div>
{% endblock %}
